# nixpacks.toml — Override install phase so Railway only uses
# requirements-railway.txt (no PyTorch/ultralytics, no opencv-python GUI).
# Without this, nixpacks auto-detects requirements.txt and installs it first,
# then requirements-railway.txt installs opencv-python-headless on top,
# causing both cv2 packages to be present → ImportError at startup.

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir -r requirements-railway.txt"
]
